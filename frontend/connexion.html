<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion - MeetSkills</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">

    <div class="auth-logo">
      <a href="index.html">
        <svg width="32" height="32" viewBox="0 0 200 200">
          <g fill="none" stroke="#3CB371" stroke-width="14" stroke-linecap="round">
            <path d="M100 100 C 100 60, 70 30, 40 35"/>
            <path d="M100 100 C 100 60, 120 30, 150 35"/>
            <path d="M100 100 C 140 100, 170 70, 165 40"/>
            <path d="M100 100 C 140 100, 170 130, 165 160"/>
            <path d="M100 100 C 100 140, 130 170, 160 165"/>
            <path d="M100 100 C 100 140, 80 170, 50 165"/>
            <path d="M100 100 C 60 100, 30 130, 35 160"/>
            <path d="M100 100 C 60 100, 30 70, 35 40"/>
          </g>
        </svg>
        <span>MEETSKILLS</span>
      </a>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Bon retour</h1>
      <p class="auth-subtitle">Connectez-vous pour continuer votre mentorat</p>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <div class="form-group">
        <label for="email">E-mail ou numéro de téléphone</label>
        <input type="email" id="email" placeholder="prenom.nom@ifri.uac.bj" />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" />
        <a href="mot-de-passe-oublie.html" class="form-link form-link--right">Mot de passe oublié ?</a>
      </div>

      <button class="btn btn--primary btn--full" id="loginBtn" onclick="handleLogin()">
        Se connecter
      </button>

      <p class="auth-footer">
        Pas encore de compte ? <a href="inscription.html" class="form-link">Créer un compte</a>
      </p>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        errorMsg.textContent = 'Veuillez remplir tous les champs.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.textContent = 'Connexion...';
      btn.disabled = true;

      const success = await login(email, password);

      if (success) {
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = 'Email ou mot de passe incorrect.';
        errorMsg.style.display = 'block';
        btn.textContent = 'Se connecter';
        btn.disabled = false;
      }
    }

    // Connexion avec la touche Entrée
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
