<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription - MeetSkills</title>
  <link rel="stylesheet" href="css/style.css" />
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">☰</button>
</head>
<body class="auth-page">

  <div class="auth-container" style="max-width:520px;">

    <div class="auth-logo">
      <a href="index.html">
        <svg width="32" height="32" viewBox="0 0 200 200">
          <g fill="none" stroke="#3CB371" stroke-width="14" stroke-linecap="round">
            <path d="M100 100 C 100 60, 70 30, 40 35"/>
            <path d="M100 100 C 100 60, 120 30, 150 35"/>
            <path d="M100 100 C 140 100, 170 70, 165 40"/>
            <path d="M100 100 C 140 100, 170 130, 165 160"/>
            <path d="M100 100 C 100 140, 130 170, 160 165"/>
            <path d="M100 100 C 100 140, 80 170, 50 165"/>
            <path d="M100 100 C 60 100, 30 130, 35 160"/>
            <path d="M100 100 C 60 100, 30 70, 35 40"/>
          </g>
        </svg>
        <span>MEETSKILLS</span>
      </a>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-subtitle">Rejoignez la communauté étudiante du Bénin</p>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="nom" placeholder="HANTO" />
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="prenom" placeholder="Jordy" />
        </div>
      </div>

      <div class="form-group">
        <label>Adresse e-mail universitaire</label>
        <input type="email" id="email" placeholder="prenom.nom@ifri.uac.bj" />
      </div>

      <div class="form-group">
        <label>Numéro de téléphone</label>
        <input type="tel" id="telephone" placeholder="+229 01 XX XX XX XX" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Université / Institut</label>
          <input type="text" id="universite" placeholder="IFRI - UAC" />
        </div>
        <div class="form-group">
          <label>Filière / Niveau</label>
          <input type="text" id="filiere" placeholder="L1 Informatique" />
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn btn--primary btn--full" id="registerBtn" onclick="handleRegister()">
        Créer mon compte
      </button>

      <p class="auth-footer">
        Déjà inscrit ? <a href="connexion.html" class="form-link">Se connecter</a>
      </p>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script>
    async function handleRegister() {
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('registerBtn');

      const data = {
        nom: document.getElementById('nom').value.trim(),
        prenom: document.getElementById('prenom').value.trim(),
        email: document.getElementById('email').value.trim(),
        telephone: document.getElementById('telephone').value.trim(),
        universite: document.getElementById('universite').value.trim(),
        filiere: document.getElementById('filiere').value.trim(),
        niveau: 'licence',
        password: document.getElementById('password').value,
      };

      if (!data.nom || !data.prenom || !data.email || !data.password) {
        errorMsg.textContent = 'Veuillez remplir tous les champs obligatoires.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.textContent = 'Création...';
      btn.disabled = true;

      const result = await register(data);

      if (result.status === 201) {
        // Connexion automatique après inscription
        const success = await login(data.email, data.password);
        if (success) window.location.href = 'index.html';
      } else {
        const errors = Object.values(result.data).flat().join(' ');
        errorMsg.textContent = errors || 'Une erreur est survenue.';
        errorMsg.style.display = 'block';
        btn.textContent = 'Créer mon compte';
        btn.disabled = false;
      }
    }
  </script>
  <script>
  function toggleMenu() {
    const nav = document.getElementById('mainNav');
    nav.classList.toggle('open');
  }
</script>

</body>
</html>
